apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-app
  template:
    metadata:
      labels:
        app: docker-app
    spec:
      containers:
      - name: docker-app
        image: voykhad/docker1:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: docker-service
spec:
  type: NodePort
  selector:
    app: docker-app
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080